<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArcLearn | Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="chat-widget.css" />
  <style>
    :root {
      --bg-cream: #fff9ea;
      --bg-mint: #dff7e7;
      --bg-sky: #d7edff;
      --ink: #143040;
      --ink-soft: #3c5c67;
      --brand-green: #4cc96f;
      --brand-green-dark: #2ca750;
      --brand-blue: #1992ff;
      --card: #ffffff;
      --card-shadow: 0 18px 45px rgba(20, 48, 64, 0.14);
      --radius-lg: 24px;
      --radius-md: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, #fef2b6 0%, transparent 40%),
        radial-gradient(circle at 90% 14%, #cbeaff 0%, transparent 34%),
        linear-gradient(160deg, var(--bg-cream) 0%, var(--bg-mint) 52%, var(--bg-sky) 100%);
      line-height: 1.5;
      overflow-x: hidden;
    }
    .page { width: min(1200px, 92vw); margin: 0 auto; padding: 24px 0 40px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .logo {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: "Baloo 2", cursive; font-size: 1.65rem; letter-spacing: 0.3px;
      color: var(--ink); text-decoration: none; font-weight: 800; white-space: nowrap;
    }
    .logo-mark {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(140deg, var(--brand-green), var(--brand-blue));
      display: grid; place-items: center; font-size: 1.25rem; color: #fff;
      box-shadow: 0 8px 18px rgba(25, 146, 255, 0.32);
    }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      border: 0; cursor: pointer; border-radius: 12px; padding: 10px 14px; font-size: 0.93rem;
      font-weight: 900; transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:focus-visible { outline: 3px solid #a4d8ff; outline-offset: 2px; }
    .btn-primary { background: var(--brand-green); color: #fff; box-shadow: 0 8px 18px rgba(44, 167, 80, 0.3); }
    .btn-primary:hover { background: var(--brand-green-dark); }
    .btn-soft { background: #ffffff; color: #20313f; border: 2px solid #e2ecf4; }
    .btn-danger { background: #ffe5e2; color: #932d23; border: 2px solid #ffd0cb; }
    .google-btn { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #20313f; border: 2px solid #e2ecf4; }
    .google-badge { width: 18px; height: 18px; border-radius: 50%; background: conic-gradient(#ea4335 0 25%, #fbbc05 25% 50%, #34a853 50% 75%, #4285f4 75% 100%); }

    .card { background: var(--card); border-radius: var(--radius-lg); box-shadow: var(--card-shadow); border: 2px solid #e9f2f9; }
    .hero { padding: 22px; }
    .eyebrow {
      display: inline-block; font-size: 0.84rem; text-transform: uppercase; letter-spacing: 1.1px;
      color: #2a5974; background: #e8f4ff; border: 1px solid #d0e6fb;
      border-radius: 999px; padding: 6px 12px; margin-bottom: 10px; font-weight: 900;
    }
    h1, h2, h3 { font-family: "Baloo 2", cursive; }
    h1 { font-size: clamp(1.9rem, 3vw, 2.6rem); margin-bottom: 8px; line-height: 1.1; }
    .hero p { color: var(--ink-soft); font-weight: 800; max-width: 70ch; }
    .grid { display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

    .course-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
    @media (max-width: 780px) { .course-grid { grid-template-columns: 1fr; } }

    .course-card {
      border: 2px solid #ebf1f7; border-radius: var(--radius-md);
      background: #ffffff; box-shadow: 0 7px 18px rgba(18, 63, 89, 0.08);
      padding: 14px; display: grid; gap: 10px;
    }
    .course-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .course-name { font-family: "Baloo 2", cursive; font-weight: 900; font-size: 1.2rem; line-height: 1.1; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 1000; color: #0f5d97; background: #edf7ff; border: 2px solid #d8ebfb;
      border-radius: 999px; padding: 6px 10px; font-size: 12px; white-space: nowrap;
    }
    .course-desc { color: #2f5566; font-weight: 800; font-size: 0.95rem; }
    .course-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .side { padding: 16px; display: grid; gap: 12px; }
    .panel { padding: 16px; border: 2px solid #e9f2f9; border-radius: 18px; background: #ffffff; box-shadow: 0 12px 28px rgba(20, 48, 64, 0.12); }
    .authline { min-height: 44px; display: flex; align-items: center; border: 1px solid #ddeffc; border-radius: 12px; background: #f4fbff; color: #215d7b; font-weight: 900; padding: 10px 12px; }
    .authline.ok { color: #1f7a3c; background: #e8f9ee; border-color: #ceefda; }
    .authline.err { color: #8c2a1f; background: #ffece9; border-color: #ffd5cf; }
    label { font-weight: 900; font-size: 0.9rem; color: #244655; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 11px; border-radius: 11px; border: 2px solid #e2ecf4; font: 800 0.95rem "Nunito", sans-serif; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hint { color: var(--ink-soft); font-size: 0.9rem; font-weight: 800; }
    .xp { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chip { font-weight: 1000; color: #215d7b; background: #f4fbff; border: 1px solid #ddeffc; border-radius: 999px; padding: 9px 12px; min-height: 40px; display: inline-flex; align-items: center; }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="logo" href="index.html"><span class="logo-mark">A</span>ArcLearn</a>
      <div class="top-actions">
        <div class="chip" id="xpChip">XP: 0 (Lv 1)</div>
        <button id="topGoogleBtn" class="btn google-btn" type="button">
          <span class="google-badge" aria-hidden="true"></span>
          Sign in with Google
        </button>
        <button id="topSignOutBtn" class="btn btn-danger" type="button" hidden>Sign out</button>
      </div>
    </header>

    <section class="card hero">
      <span class="eyebrow">Choose a course</span>
      <h1>What do you want to learn today?</h1>
      <p>Pick a course hub. Your XP, streak, and weak spots carry across courses when you are signed in.</p>
    </section>

    <main class="grid">
      <section class="card">
        <div class="course-grid" id="courseGrid"></div>
      </section>

      <aside class="side">
        <div class="panel">
          <h2 style="margin-bottom:10px;">Profile</h2>
          <div id="authLine" class="authline">Checking sign-in...</div>
          <div class="hint" style="margin:8px 0 0;">Name is required to save lesson completions cleanly.</div>
          <div style="height:10px;"></div>
          <div class="row">
            <div>
              <label for="nameInput">Name</label>
              <input id="nameInput" type="text" placeholder="Your name" autocomplete="name" />
            </div>
            <div>
              <label for="gradeSelect">Grade</label>
              <select id="gradeSelect">
                <option value="">Choose...</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="college">College</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div style="height:10px;"></div>
          <div>
            <label for="paceSelect">Pace</label>
            <select id="paceSelect">
              <option value="steady">Steady</option>
              <option value="sprint">Sprint</option>
              <option value="test_prep">Test prep</option>
              <option value="recovery">Recovery</option>
            </select>
          </div>
          <div style="height:12px;"></div>
          <button id="saveProfileBtn" class="btn btn-primary" type="button">Save profile</button>
          <div class="hint">Saved to your account when signed in.</div>
        </div>

        <div class="panel">
          <div data-arclearn-weakness-mount></div>
        </div>
      </aside>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAnalytics, isSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbL7fYQ_6ZbgsE4AI40Qxau4PFfwttTQU",
      authDomain: "test-75c2d.firebaseapp.com",
      projectId: "test-75c2d",
      storageBucket: "test-75c2d.firebasestorage.app",
      messagingSenderId: "987731049365",
      appId: "1:987731049365:web:f834290d8c491faf3a549c",
      measurementId: "G-XBZB92CP82",
      databaseURL: "https://test-75c2d-default-rtdb.firebaseio.com",
    };

    const app = initializeApp(firebaseConfig);
    try { if (await isSupported()) getAnalytics(app); } catch {}
    const auth = getAuth(app);
    const db = getDatabase(app);
    await setPersistence(auth, browserLocalPersistence);
    const provider = new GoogleAuthProvider();

    const PROFILE_KEY = "arclearn_profile_v1";

    const topGoogleBtn = document.getElementById("topGoogleBtn");
    const topSignOutBtn = document.getElementById("topSignOutBtn");
    const xpChip = document.getElementById("xpChip");

    const authLine = document.getElementById("authLine");
    const nameInput = document.getElementById("nameInput");
    const gradeSelect = document.getElementById("gradeSelect");
    const paceSelect = document.getElementById("paceSelect");
    const saveProfileBtn = document.getElementById("saveProfileBtn");

    function setAuthLine(message, mode) {
      authLine.textContent = message;
      authLine.classList.remove("ok", "err");
      if (mode === "ok") authLine.classList.add("ok");
      if (mode === "err") authLine.classList.add("err");
    }

    function setXpLine(xp) {
      const total = Math.max(0, Math.floor(Number(xp) || 0));
      const level = Math.floor(total / 100) + 1;
      xpChip.textContent = `XP: ${total} (Lv ${level})`;
    }
    setXpLine(0);

    function loadLocalProfile() {
      try {
        const raw = localStorage.getItem(PROFILE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveLocalProfile(profile) {
      localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
    }

    topGoogleBtn.addEventListener("click", async () => {
      setAuthLine("Opening Google sign-in...", "");
      try { await signInWithPopup(auth, provider); }
      catch (e) { setAuthLine(`Sign-in failed: ${e.message}`, "err"); }
    });

    topSignOutBtn.addEventListener("click", async () => {
      try { await signOut(auth); }
      catch (e) { setAuthLine(`Sign-out failed: ${e.message}`, "err"); }
    });

    saveProfileBtn.addEventListener("click", async () => {
      const name = (nameInput.value || "").trim();
      const grade = gradeSelect.value;
      const pace = paceSelect.value;
      if (!name) {
        setAuthLine("Please enter your name to continue.", "err");
        nameInput.focus();
        return;
      }

      saveLocalProfile({ name, grade, pace, updatedAt: new Date().toISOString() });

      const user = auth.currentUser;
      if (user) {
        try { await updateProfile(user, { displayName: name }); } catch {}
        try {
          await update(ref(db, `profiles/byUid/${user.uid}`), {
            name,
            grade: grade || "",
            pace: pace || "",
            email: user.email || "",
            updatedAt: serverTimestamp(),
          });
        } catch (e) {
          console.warn("Profile RTDB sync failed:", e);
        }
      }

      setAuthLine(`Profile saved. Welcome, ${name}.`, "ok");
    });

    // Course list
    const courses = [
      { id: "calculus", name: "AP Calculus (AB + BC)", desc: "Limits, derivatives, integrals, series.", href: "calculus.html", tag: "Quiz lessons" },
      { id: "biology", name: "AP Biology", desc: "Cells, heredity, evolution, ecology.", href: "biology.html", tag: "Quiz lessons" },
      { id: "finance", name: "Finance", desc: "Budgeting, investing, money choices.", href: "finance.html", tag: "Quiz + Sim" },
      { id: "economics", name: "Economics", desc: "Micro + macro foundations and tools.", href: "economics.html", tag: "Quiz lessons" },
      { id: "fitness", name: "TeenFit", desc: "Warm-ups, mobility, strength basics.", href: "fitness.html", tag: "Warm-up + lessons" },
      { id: "english", name: "English", desc: "Reading + writing skills (prototype).", href: "english-one.html", tag: "Prototype" },
    ];

    const grid = document.getElementById("courseGrid");
    function renderCourses() {
      grid.innerHTML = "";

      courses.forEach((c) => {
        const el = document.createElement("article");
        el.className = "course-card";
        el.innerHTML = `
          <div class="course-top">
            <div>
              <div class="course-name">${escapeHtml(c.name)}</div>
              <div class="course-desc">${escapeHtml(c.desc)}</div>
            </div>
            <div class="pill">${escapeHtml(c.tag)}</div>
          </div>
          <div class="course-actions">
            <a class="btn btn-primary" href="${escapeAttr(c.href)}" style="text-decoration:none;">Open</a>
          </div>
        `;
        grid.appendChild(el);
      });
    }
    function escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/`/g, "");
    }
    renderCourses();

    let profUnsub = null;
    onAuthStateChanged(auth, (user) => {
      if (profUnsub) { try { profUnsub(); } catch {} profUnsub = null; }

      const local = loadLocalProfile();
      if (local && local.name && !nameInput.value) nameInput.value = local.name;
      if (local && local.grade && !gradeSelect.value) gradeSelect.value = local.grade;
      if (local && local.pace && !paceSelect.value) paceSelect.value = local.pace;

      if (user) {
        topGoogleBtn.hidden = true;
        topSignOutBtn.hidden = false;
        setAuthLine(`Signed in: ${user.email || "account"}`, "ok");

        const suggested = (user.displayName || "").trim();
        if (suggested && !nameInput.value) nameInput.value = suggested;

        profUnsub = onValue(ref(db, `profiles/byUid/${user.uid}`), (snap) => {
          const prof = snap.val() || {};
          setXpLine(prof?.xp || 0);
          try {
            if (prof?.streak) localStorage.setItem("arclearn_streak_v1", JSON.stringify(prof.streak));
            if (prof?.weaknesses && typeof prof.weaknesses === "object") {
              localStorage.setItem("arclearn_weaknesses_v1", JSON.stringify(prof.weaknesses));
            }
          } catch {}
        }, () => setXpLine(0));
      } else {
        topGoogleBtn.hidden = false;
        topSignOutBtn.hidden = true;
        setAuthLine("Not signed in. Sign in to sync XP and progress.", "");
        setXpLine(0);
      }
    });
  </script>

  <script type="module" src="chat-widget.js"></script>
  <script type="module" src="streak-weakness-widget.js"></script>
</body>
</html>
